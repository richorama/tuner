<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="34%" r="70%">
      <stop offset="0" stop-color="#141a2e"/>
      <stop offset="1" stop-color="#070a12"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bgGlow)"/>
  <rect x="8" y="8" width="496" height="496" rx="104" fill="none" stroke="url(#neon)" stroke-width="6" opacity="0.5"/>

  <!-- tuning fork -->
  <g filter="url(#glow)" stroke="url(#neon)" stroke-linecap="round" fill="none">
    <path d="M168 96v150a88 88 0 0 0 176 0V96" stroke-width="34"/>
    <path d="M256 334v82" stroke-width="34"/>
    <circle cx="256" cy="432" r="22" fill="url(#neon)" stroke="none"/>
  </g>

  <!-- sound waves -->
  <g stroke="#22d3ee" stroke-width="10" stroke-linecap="round" opacity="0.85" fill="none">
    <path d="M392 196q26 60 0 120"/>
    <path d="M120 196q-26 60 0 120" stroke="#818cf8"/>
  </g>
</svg>
